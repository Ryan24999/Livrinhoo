<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- O código abaixo impede o celular de dar zoom ou mover a tela ao arrastar o dedo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Para Você</title>
    <style>
        /* Força o fundo a ficar travado, impedindo qualquer movimento de rolagem */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Remove gestos nativos do navegador do celular */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        .book-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #book {
            margin: 0 auto;
        }

        .page {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="book-wrapper">
        <div id="book">
            <div class="page" style="background-image: url('capa.jpg')"></div>
            <div class="page" style="background-image: url('pag1.jpg')"></div>
            <div class="page" style="background-image: url('pag2.jpg')"></div>
            <div class="page" style="background-image: url('pag3.jpg')"></div>
            <div class="page" style="background-image: url('pag4.jpg')"></div>
            <div class="page" style="background-image: url('pag5.jpg')"></div>
            <div class="page" style="background-image: url('pag6.jpg')"></div>
            <div class="page" style="background-image: url('pag7.jpg')"></div>
            <div class="page" style="background-image: url('pag8.jpg')"></div>
            <div class="page" style="background-image: url('pag9.jpg')"></div>
            <div class="page" style="background-image: url('pag10.jpg')"></div>
            <div class="page" style="background-image: url('pag11.jpg')"></div>
            <div class="page" style="background-image: url('pag12.jpg')"></div>
            <div class="page" style="background-image: url('pag13.jpg')"></div>
            <div class="page" style="background-image: url('pag14.jpg')"></div>
            <div class="page" style="background-image: url('pag15.jpg')"></div>
            <div class="page" style="background-image: url('contracapa.jpg')"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Garante que o celular ignore os comandos de arrastar nativos do navegador
            document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

            function resizeBook() {
                var wW = $(window).width();
                var wH = $(window).height();
                
                var bW = 800;
                var bH = 600;

                // Ajuste agressivo para telas de celular rodarem nativamente sem o modo desktop ativado
                if (wW < 850) {
                    bW = wW * 0.90; 
                    bH = (bW / 2) * 1.4; 
                    
                    if (bH > wH * 0.8) {
                        bH = wH * 0.8;
                        bW = (bH / 1.4) * 2;
                    }
                }

                // Aplica o tamanho nas páginas individuais
                $('.page').css({ width: bW / 2, height: bH });

                // Se o livro já foi criado, altera o tamanho, se não, cria do zero
                if ($('#book').turn('is')) {
                    $('#book').turn('size', bW, bH);
                } else {
                    $('#book').turn({
                        width: bW,
                        height: bH,
                        elevation: 50,
                        gradients: true,
                        autoCenter: true,
                        display: 'double',
                        acceleration: true
                    });
                }
            }

            // Executa a montagem do livro
            resizeBook();

            // Refaz o cálculo se o celular for girado de lado
            $(window).resize(function() {
                resizeBook();
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- Impede o celular de tremer ou dar zoom indesejado -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Você</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Trava o fundo do celular de mover ou arrastar */
            touch-action: none; 
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .flip-book {
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- O livro começa vazio e o script injeta as imagens -->
        <div class="flip-book" id="book"></div>
    </div>

    <!-- Biblioteca moderna e leve -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Configura o tamanho baseado na tela do dispositivo
            const isMobile = window.innerWidth < 768;
            
            // Se for celular, criamos páginas um pouco menores para caber na tela de pé
            const width = isMobile ? window.innerWidth * 0.85 : 400;
            const height = isMobile ? (width * 1.5) : 600;

            const pageFlip = new St.PageFlip(document.getElementById('book'), {
                width: width,
                height: height,
                size: "fixed", 
                drawShadow: true,      // Sombra 3D linda no meio do livro
                showCover: true,       // Primeira e última são capa dura
                usePortrait: isMobile, // Se for celular, mostra 1 página (evita o bug de ficar translúcido)
                
                // ATIVADORES DO ARRASTO DO DEDO:
                swipeDistance: 15,         // Sensibilidade do arrasto
                clickEventForward: false,  // Prioriza o toque e arrasto ao invés do clique seco
                useMouseEvents: true       // Funciona arrastando no PC também
            });

            // Lista das suas fotos na ordem exata
            const imagens = [
                'capa.jpg', 'pag1.jpg', 'pag2.jpg', 'pag3.jpg', 'pag4.jpg', 
                'pag5.jpg', 'pag6.jpg', 'pag7.jpg', 'pag8.jpg', 'pag9.jpg', 
                'pag10.jpg', 'pag11.jpg', 'pag12.jpg', 'pag13.jpg', 'pag14.jpg', 
                'pag15.jpg', 'contracapa.jpg'
            ];

            // Inicializa o livro carregando as imagens diretamente
            pageFlip.loadFromImages(imagens);
        });
    </script>
</body>
</html>

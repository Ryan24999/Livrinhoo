<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Você</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50; 
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        /* Contêiner principal para garantir que o livro fique centralizado */
        .book-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        .page {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="book-wrapper">
        <!-- Estrutura do livro -->
        <div id="book">
            <div class="page" style="background-image: url('capa.jpg')"></div>
            <div class="page" style="background-image: url('pag1.jpg')"></div>
            <div class="page" style="background-image: url('pag2.jpg')"></div>
            <div class="page" style="background-image: url('pag3.jpg')"></div>
            <div class="page" style="background-image: url('pag4.jpg')"></div>
            <div class="page" style="background-image: url('pag5.jpg')"></div>
            <div class="page" style="background-image: url('pag6.jpg')"></div>
            <div class="page" style="background-image: url('pag7.jpg')"></div>
            <div class="page" style="background-image: url('pag8.jpg')"></div>
            <div class="page" style="background-image: url('pag9.jpg')"></div>
            <div class="page" style="background-image: url('pag10.jpg')"></div>
            <div class="page" style="background-image: url('pag11.jpg')"></div>
            <div class="page" style="background-image: url('pag12.jpg')"></div>
            <div class="page" style="background-image: url('pag13.jpg')"></div>
            <div class="page" style="background-image: url('pag14.jpg')"></div>
            <div class="page" style="background-image: url('pag15.jpg')"></div>
            <div class="page" style="background-image: url('contracapa.jpg')"></div>
        </div>
    </div>

    <!-- Scripts necessários -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Função para calcular o tamanho ideal do livro baseado na tela
            function getBookSize() {
                var windowWidth = $(window).width();
                var windowHeight = $(window).height();
                
                // Tamanho padrão para computadores (Livro aberto completo)
                var bookWidth = 800;
                var bookHeight = 600;

                // Se for celular ou tela pequena, reduzimos proporcionalmente mantendo as duas páginas
                if (windowWidth < 850) {
                    bookWidth = windowWidth * 0.95; // Usa 95% da largura da tela do celular
                    bookHeight = (bookWidth / 2) * 1.4; // Mantém a proporção de livro em pé
                    
                    // Garante que o livro não fique mais alto que a tela do celular
                    if (bookHeight > windowHeight * 0.8) {
                        bookHeight = windowHeight * 0.8;
                        bookWidth = (bookHeight / 1.4) * 2;
                    }
                }

                return { width: bookWidth, height: bookHeight };
            }

            var size = getBookSize();

            // Inicializa o Turn.js SEMPRE no modo duplo (corrige a translucidez)
            $('#book').turn({
                width: size.width,
                height: size.height,
                elevation: 50,
                gradients: true, // Habilita sombras e gradientes realistas na dobra
                autoCenter: true,
                display: 'double', // Mantém o modo livro aberto para evitar bugs visuais
                acceleration: true // Usa aceleração de hardware do celular para ficar super liso
            });

            // Ajusta as páginas internas para o tamanho correto
            $('.page').css({
                width: size.width / 2,
                height: size.height
            });

            // Redimensiona o livro caso a pessoa vire o celular de lado
            $(window).resize(function() {
                var newSize = getBookSize();
                $('#book').turn('size', newSize.width, newSize.height);
                $('.page').css({
                    width: newSize.width / 2,
                    height: newSize.height
                });
            });
        });
    </script>
</body>
</html>

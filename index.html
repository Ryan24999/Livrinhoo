<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50; /* Cor do fundo da tela */
            margin: 0;
            overflow: hidden;
        }
        .flip-book {
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <!-- Contêiner do Livro vazio (o script vai colocar as imagens aqui) -->
    <div class="flip-book" id="book"></div>

    <!-- Biblioteca 3D -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pageFlip = new St.PageFlip(document.getElementById('book'), {
                width: 400,
                height: 600,
                size: "stretch",
                minWidth: 300,
                maxWidth: 500,
                minHeight: 400,
                maxHeight: 700,
                drawShadow: true,
                showCover: true,
                usePortrait: true
            });

            // Força o carregamento direto das imagens
            pageFlip.loadFromImages([
                'capa.jpg',
                'pag1.jpg',
                'pag2.jpg',
                'pag3.jpg',
                'pag4.jpg',
                'pag5.jpg',
                'pag6.jpg',
                'pag7.jpg',
                'pag8.jpg',
                'pag9.jpg',
                'pag10.jpg',
                'pag11.jpg',
                'pag12.jpg',
                'pag13.jpg',
                'pag14.jpg',
                'pag15.jpg',
                'contracapa.jpg'
            ]);
        });
    </script>
</body>
</html>

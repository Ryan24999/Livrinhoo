<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Para Você</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    body {
      background: #2c3e50;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #start-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      flex-direction: column;
    }
    
    #btn-abrir {
      padding: 20px 40px;
      font-size: 24px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      font-family: sans-serif;
    }

    .topo-personalizado {
      position: absolute;
      top: 2vh; bottom: 62vh; left: 50%; transform: translateX(-50%);
      display: flex; justify-content: center; align-items: center;
      width: 95%; z-index: 10; 
    }
    .topo-personalizado img { width: 100%; height: 100%; max-width: 650px; object-fit: contain; }

    .wrapper {
      position: relative; width: 100%; height: 100%; display: flex;
      justify-content: center; align-items: center;
    }
    #flipbook { box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    #flipbook .page { background: white; overflow: hidden; }
    #flipbook .page img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

<div id="start-screen">
  <button id="btn-abrir">Abrir Presente! 🎁</button>
</div>

<!-- Configuração dos Áudios -->
<audio id="som-festa" src="happy.mp3"></audio>
<!-- O 'loop' faz a música recomeçar sozinha quando terminar -->
<audio id="musica-fundo" src="musica.mp3" loop></audio>

<div class="topo-personalizado">
  <img src="momo1.png" alt="Título Superior">
</div>

<div class="wrapper">
  <div id="flipbook">
    <div class="page"><img src="capa.jpg" alt="Capa"></div>
    <div class="page"><img src="pag1.jpg" alt=""></div>
    <div class="page"><img src="pag2.jpg" alt=""></div>
    <div class="page"><img src="pag3.jpg" alt=""></div>
    <div class="page"><img src="pag4.jpg" alt=""></div>
    <div class="page"><img src="pag5.jpg" alt=""></div>
    <div class="page"><img src="pag6.jpg" alt=""></div>
    <div class="page"><img src="pag7.jpg" alt=""></div>
    <div class="page"><img src="pag8.jpg" alt=""></div>
    <div class="page"><img src="pag9.jpg" alt=""></div>
    <div class="page"><img src="pag10.jpg" alt=""></div>
    <div class="page"><img src="pag11.jpg" alt=""></div>
    <div class="page"><img src="pag12.jpg" alt=""></div>
    <div class="page"><img src="pag13.jpg" alt=""></div>
    <div class="page"><img src="pag14.jpg" alt=""></div>
    <div class="page"><img src="pag15.jpg" alt=""></div>
    <div class="page"><img src="contracapa.jpg" alt="Contra-capa"></div>
  </div>
</div>

<script>
  $(document).ready(function() {
    var somFesta = document.getElementById('som-festa');
    var musicaFundo = document.getElementById('musica-fundo');

    $('#btn-abrir').click(function() {
      // Toca o som de criança e solta confetes
      somFesta.play();
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      
      // Some com a tela de início e mostra o livro
      $('#start-screen').fadeOut(500);
      iniciarLivro();

      // PROGRAMADO: Assim que o som de festa acabar, inicia a música de fundo
      somFesta.onended = function() {
        musicaFundo.play().catch(function(erro) {
          console.log("A música de fundo foi bloqueada ou não carregou:", erro);
        });
      };
    });

    function iniciarLivro() {
      var larguraTela = $(window).width();
      var alturaTela = $(window).height();
      var larguraLivro = 800, alturaLivro = 600;

      if (larguraTela < 850) {
        larguraLivro = larguraTela * 0.92; 
        alturaLivro = (larguraLivro / 2) * 1.35; 
        if (alturaLivro > alturaTela * 0.58) {
          alturaLivro = alturaTela * 0.58;
          larguraLivro = (alturaLivro / 1.35) * 2;
        }
      }

      // Inicializa o livro sem nenhum som interno nas páginas
      $('#flipbook').turn({
        width: larguraLivro,
        height: alturaLivro,
        elevation: 50,
        gradients: true,
        autoCenter: true,
        display: 'double',
        acceleration: true
      });
    }
  });
</script>

</body>
</html>

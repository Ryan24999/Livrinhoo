<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Você</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50; 
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        #book {
            width: 400px;
            height: 600px;
        }
        .page {
            width: 400px;
            height: 600px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: white;
        }
    </style>
</head>
<body>

    <!-- Estrutura do livro para o Turn.js -->
    <div id="book">
        <div class="page" style="background-image: url('capa.jpg')"></div>
        <div class="page" style="background-image: url('pag1.jpg')"></div>
        <div class="page" style="background-image: url('pag2.jpg')"></div>
        <div class="page" style="background-image: url('pag3.jpg')"></div>
        <div class="page" style="background-image: url('pag4.jpg')"></div>
        <div class="page" style="background-image: url('pag5.jpg')"></div>
        <div class="page" style="background-image: url('pag6.jpg')"></div>
        <div class="page" style="background-image: url('pag7.jpg')"></div>
        <div class="page" style="background-image: url('pag8.jpg')"></div>
        <div class="page" style="background-image: url('pag9.jpg')"></div>
        <div class="page" style="background-image: url('pag10.jpg')"></div>
        <div class="page" style="background-image: url('pag11.jpg')"></div>
        <div class="page" style="background-image: url('pag12.jpg')"></div>
        <div class="page" style="background-image: url('pag13.jpg')"></div>
        <div class="page" style="background-image: url('pag14.jpg')"></div>
        <div class="page" style="background-image: url('pag15.jpg')"></div>
        <div class="page" style="background-image: url('contracapa.jpg')"></div>
    </div>

    <!-- Importando jQuery e Turn.js (necessários para o efeito de arrasto realista) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Inicializa o livro com efeito de dobra dinâmico ao arrastar
            $('#book').turn({
                width: 800, // Largura total (2 páginas abertas)
                height: 600,
                elevation: 50, // Altura do efeito 3D da dobra ao arrastar
                gradients: true, // Adiciona sombras reais nas páginas enquanto dobra
                autoCenter: true,
                display: 'double', // Mostra duas páginas como um livro aberto
                when: {
                    turning: function(event, page, pageObj) {
                        // Código para ajudar na transição suave
                    }
                }
            });

            // Ajuste para telas de celular (se a tela for pequena, mostra uma página por vez)
            if ($(window).width() < 800) {
                $('#book').turn('display', 'single');
                $('#book').turn('size', 350, 525); // Reduz o tamanho para caber no celular
            }
        });
    </script>
</body>
</html>

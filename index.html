<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Para Você</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
  <style>
    body {
      background: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      touch-action: none; 
      -webkit-user-select: none;
      user-select: none;
    }

    /* --- ESTILO DO TOPO (IMAGEM GRANDE) --- */
    .topo-personalizado {
      position: absolute;
      top: 2vh; 
      left: 50%;
      transform: translateX(-50%); 
      text-align: center;
      width: 95%; 
      z-index: 10; 
    }

    .topo-personalizado img {
      max-height: 180px; /* Imagem bem grande no topo */
      width: 85%;        
      max-width: 600px;  
      object-fit: contain;
    }

    .wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 50px; /* Empurra o livro um pouco para baixo para acomodar a imagem grande */
    }

    #flipbook {
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #flipbook .page {
      background: white;
      overflow: hidden;
    }

    #flipbook .page img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
  </style>
</head>
<body>

<div class="topo-personalizado">
  <!-- MUDE 'titulo.png' PARA O NOME DA SUA IMAGEM QUE ESTÁ NO GITHUB -->
  <img src="momo1.png" alt="Título Superior">
</div>

<div class="wrapper">
  <div id="flipbook">
    <div class="page"><img src="capa.jpg" alt="Capa"></div>
    <div class="page"><img src="pag1.jpg" alt=""></div>
    <div class="page"><img src="pag2.jpg" alt=""></div>
    <div class="page"><img src="pag3.jpg" alt=""></div>
    <div class="page"><img src="pag4.jpg" alt=""></div>
    <div class="page"><img src="pag5.jpg" alt=""></div>
    <div class="page"><img src="pag6.jpg" alt=""></div>
    <div class="page"><img src="pag7.jpg" alt=""></div>
    <div class="page"><img src="pag8.jpg" alt=""></div>
    <div class="page"><img src="pag9.jpg" alt=""></div>
    <div class="page"><img src="pag10.jpg" alt=""></div>
    <div class="page"><img src="pag11.jpg" alt=""></div>
    <div class="page"><img src="pag12.jpg" alt=""></div>
    <div class="page"><img src="pag13.jpg" alt=""></div>
    <div class="page"><img src="pag14.jpg" alt=""></div>
    <div class="page"><img src="pag15.jpg" alt=""></div>
    <div class="page"><img src="contracapa.jpg" alt="Contra-capa"></div>
  </div>
</div>

<script>
  $(document).ready(function() {
    document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

    function iniciarLivro() {
      var larguraTela = $(window).width();
      var alturaTela = $(window).height();
      
      var larguraLivro = 800;
      var alturaLivro = 600;

      if (larguraTela < 850) {
        larguraLivro = larguraTela * 0.90; 
        alturaLivro = (larguraLivro / 2) * 1.4; 
        
        // Ajuste de altura agressivo para deixar espaço para a imagem grande acima
        if (alturaLivro > alturaTela * 0.60) {
          alturaLivro = alturaTela * 0.60;
          larguraLivro = (alturaLivro / 1.4) * 2;
        }
      }

      $('#flipbook').turn({
        width: larguraLivro,
        height: alturaLivro,
        elevation: 50,
        gradients: true,
        autoCenter: true,
        display: 'double',
        acceleration: true
      });
    }

    iniciarLivro();
  });
</script>

</body>
</html>
